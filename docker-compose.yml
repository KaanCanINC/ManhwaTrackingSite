services:
  mancon:
    image: kaancaninc/mancon:latest
    container_name: ManCon
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - DB_DIR=/data/database
      - BACKUPS_DIR=/data/backups
      - IMPORTS_DIR=/data/imports
      - MAX_BACKUPS=60
    volumes:
      - /var/lib/casaos/appdata/mancon/database:/data/database
      - /var/lib/casaos/appdata/mancon/backups:/data/backups
      - /var/lib/casaos/appdata/mancon/imports:/data/imports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/series?limit=1', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
